<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gym Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: #020010;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Galaxy background */
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle linear infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    /* Nebula glow */
    .nebula {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      animation: nebulaPulse ease-in-out infinite;
    }

    @keyframes nebulaPulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.2); opacity: 0.5; }
    }

    .nebula-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #7b2fff, transparent);
      top: -100px; left: -100px;
      animation-duration: 8s;
    }

    .nebula-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #0066ff, transparent);
      bottom: -100px; right: -100px;
      animation-duration: 6s;
      animation-delay: 2s;
    }

    .nebula-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #ff00ff, transparent);
      top: 50%; left: 50%;
      animation-duration: 10s;
      animation-delay: 1s;
      opacity: 0.15;
    }

    /* Flying equipment */
    .equipment {
      position: fixed;
      opacity: 0.1;
      animation: flyUp linear infinite;
      z-index: 1;
      pointer-events: none;
      filter: drop-shadow(0 0 8px rgba(123,47,255,0.8));
    }

    @keyframes flyUp {
      0%   { transform: translateY(110vh) rotate(0deg) scale(0.5); opacity: 0; }
      10%  { opacity: 0.15; }
      90%  { opacity: 0.15; }
      100% { transform: translateY(-10vh) rotate(720deg) scale(1.2); opacity: 0; }
    }

    /* Shooting stars */
    .shoot {
      position: fixed;
      width: 120px; height: 2px;
      background: linear-gradient(90deg, transparent, #7b2fff, white);
      border-radius: 2px;
      animation: shoot linear infinite;
      z-index: 1;
    }

    @keyframes shoot {
      0%   { transform: translateX(-200px) translateY(0) rotate(-45deg); opacity: 0; }
      10%  { opacity: 1; }
      100% { transform: translateX(110vw) translateY(110vh) rotate(-45deg); opacity: 0; }
    }

    /* Login card */
    .login-container {
      position: relative;
      z-index: 10;
      animation: cardIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardIn {
      from { transform: scale(0.3) rotate(-10deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .login-card {
      background: rgba(10, 0, 40, 0.7);
      backdrop-filter: blur(40px);
      border: 1px solid rgba(123,47,255,0.4);
      border-radius: 30px;
      padding: 55px 50px;
      width: 440px;
      box-shadow:
        0 0 60px rgba(123,47,255,0.2),
        0 0 120px rgba(0,102,255,0.1),
        inset 0 1px 0 rgba(255,255,255,0.1),
        0 30px 80px rgba(0,0,0,0.8);
      position: relative;
      overflow: hidden;
    }

    /* Card inner glow */
    .login-card::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at center, rgba(123,47,255,0.05), transparent 60%);
      animation: rotate 10s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Top border glow */
    .login-card::after {
      content: '';
      position: absolute;
      top: 0; left: 10%;
      width: 80%; height: 1px;
      background: linear-gradient(90deg, transparent, #7b2fff, #0066ff, #7b2fff, transparent);
      animation: borderGlow 3s ease-in-out infinite;
    }

    @keyframes borderGlow {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; box-shadow: 0 0 20px #7b2fff; }
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInDown 0.8s ease 0.3s both;
      position: relative;
    }

    @keyframes fadeInDown {
      from { transform: translateY(-30px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .logo-icon {
      font-size: 70px;
      display: block;
      margin-bottom: 15px;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(123,47,255,0.9));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-15px) scale(1.05); }
    }

    .logo h1 {
      font-family: 'Orbitron', monospace;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #7b2fff, #0066ff, #ff00ff, #7b2fff);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: galaxyShine 4s linear infinite;
    }

    @keyframes galaxyShine {
      0%   { background-position: 0% center; }
      100% { background-position: 300% center; }
    }

    .logo p {
      color: rgba(150,120,255,0.6);
      font-size: 12px;
      margin-top: 8px;
      letter-spacing: 3px;
      font-family: 'Orbitron', monospace;
    }

    /* Orbit ring */
    .orbit {
      width: 80px; height: 80px;
      border: 1px solid rgba(123,47,255,0.3);
      border-radius: 50%;
      position: absolute;
      top: 30px; left: 50%;
      transform: translateX(-50%);
      animation: orbitSpin 4s linear infinite;
    }

    .orbit::before {
      content: '⭐';
      position: absolute;
      top: -8px; left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
    }

    @keyframes orbitSpin {
      from { transform: translateX(-50%) rotate(0deg); }
      to   { transform: translateX(-50%) rotate(360deg); }
    }

    .form-group {
      margin-bottom: 22px;
      animation: fadeInLeft 0.6s ease both;
      position: relative;
    }

    .form-group:nth-child(1) { animation-delay: 0.5s; }
    .form-group:nth-child(2) { animation-delay: 0.6s; }

    @keyframes fadeInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }

    .form-group label {
      display: block;
      color: rgba(123,47,255,0.9);
      font-size: 11px;
      margin-bottom: 8px;
      letter-spacing: 3px;
      font-family: 'Orbitron', monospace;
    }

    .input-wrapper { position: relative; }

    .input-icon {
      position: absolute;
      left: 15px; top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      z-index: 2;
    }

    .form-group input {
      width: 100%;
      padding: 15px 15px 15px 48px;
      background: rgba(123,47,255,0.08);
      border: 1px solid rgba(123,47,255,0.25);
      border-radius: 14px;
      color: white;
      font-size: 15px;
      font-family: 'Rajdhani', sans-serif;
      transition: all 0.4s ease;
      outline: none;
      letter-spacing: 1px;
    }

    .form-group input:focus {
      border-color: #7b2fff;
      background: rgba(123,47,255,0.15);
      box-shadow: 0 0 25px rgba(123,47,255,0.3),
                  inset 0 0 15px rgba(123,47,255,0.05);
      transform: scale(1.02);
    }

    .form-group input::placeholder {
      color: rgba(150,120,255,0.35);
      letter-spacing: 1px;
    }

    .btn-login {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #7b2fff, #0066ff, #ff00ff);
      background-size: 200% auto;
      border: none;
      border-radius: 14px;
      color: white;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Orbitron', monospace;
      cursor: pointer;
      transition: all 0.4s ease;
      margin-top: 10px;
      animation: fadeInUp 0.6s ease 0.7s both;
      letter-spacing: 3px;
      position: relative;
      overflow: hidden;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.6s ease;
    }

    .btn-login:hover::before { left: 100%; }

    .btn-login:hover {
      background-position: right center;
      transform: translateY(-4px);
      box-shadow: 0 15px 40px rgba(123,47,255,0.5),
                  0 5px 20px rgba(0,102,255,0.3),
                  0 0 60px rgba(255,0,255,0.2);
    }

    .btn-login:active {
      transform: scale(0.96);
    }

    @keyframes fadeInUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .msg {
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      margin-top: 15px;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 1px;
    }

    .success {
      background: rgba(0,255,150,0.1);
      border: 1px solid rgba(0,255,150,0.3);
      color: #00ff96;
    }

    .error {
      background: rgba(255,50,100,0.1);
      border: 1px solid rgba(255,50,100,0.3);
      color: #ff3264;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .divider {
      text-align: center;
      color: rgba(123,47,255,0.4);
      font-size: 11px;
      margin: 20px 0;
      letter-spacing: 3px;
      font-family: 'Orbitron', monospace;
      animation: fadeInUp 0.6s ease 0.8s both;
    }

    .register-link {
      text-align: center;
      animation: fadeInUp 0.6s ease 0.9s both;
    }

    .register-link a {
      color: rgba(100,150,255,0.7);
      text-decoration: none;
      font-size: 13px;
      transition: all 0.3s;
      letter-spacing: 1px;
      font-family: 'Rajdhani', sans-serif;
    }

    .register-link a:hover {
      color: #7b2fff;
      text-shadow: 0 0 15px rgba(123,47,255,0.8);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Nebula -->
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>

  <!-- Shooting stars -->
  <div class="shoot" style="top:20%; animation-duration:4s; animation-delay:0s;"></div>
  <div class="shoot" style="top:50%; animation-duration:6s; animation-delay:2s;"></div>
  <div class="shoot" style="top:70%; animation-duration:5s; animation-delay:4s;"></div>

  <!-- Flying equipment -->
  <div class="equipment" style="left:5%;  animation-duration:9s;  animation-delay:0s;  font-size:28px;">🏋️</div>
  <div class="equipment" style="left:15%; animation-duration:13s; animation-delay:2s;  font-size:22px;">💪</div>
  <div class="equipment" style="left:25%; animation-duration:10s; animation-delay:4s;  font-size:30px;">🥊</div>
  <div class="equipment" style="left:35%; animation-duration:12s; animation-delay:1s;  font-size:24px;">🏃</div>
  <div class="equipment" style="left:55%; animation-duration:11s; animation-delay:3s;  font-size:26px;">🎯</div>
  <div class="equipment" style="left:65%; animation-duration:14s; animation-delay:5s;  font-size:28px;">⚡</div>
  <div class="equipment" style="left:75%; animation-duration:9s;  animation-delay:2s;  font-size:22px;">🏋️</div>
  <div class="equipment" style="left:85%; animation-duration:12s; animation-delay:4s;  font-size:30px;">💪</div>
  <div class="equipment" style="left:93%; animation-duration:10s; animation-delay:1s;  font-size:24px;">🥊</div>

  <div class="login-container">
    <div class="login-card">
      <div class="orbit"></div>

      <div class="logo">
        <span class="logo-icon">🏃</span>
        <h1>GYM UNIVERSE</h1>
        <p>PREMIUM FITNESS SYSTEM</p>
      </div>

      <div class="form-group">
        <label>⬡ USERNAME</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input type="text" id="username" placeholder="Enter your username">
        </div>
      </div>

      <div class="form-group">
        <label>⬡ PASSWORD</label>
        <div class="input-wrapper">
          <span class="input-icon">🔑</span>
          <input type="password" id="password" placeholder="Enter your password"
            onkeypress="if(event.key==='Enter') login()">
        </div>
      </div>

      <button class="btn-login" onclick="login()" id="loginBtn">
        🏃 LAUNCH →
      </button>

      <div id="msg"></div>

      <div class="divider">✦ OR ✦</div>

      <div class="register-link">
        <a href="#" onclick="showRegister()">✨ New to the Universe? Register</a>
      </div>
    </div>
  </div>

  <script>
    // Generate stars
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 150; i++) {
      const star = document.createElement('div');
      star.classList.add('star');
      const size = Math.random() * 3 + 1;
      star.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        top: ${Math.random() * 100}%;
        left: ${Math.random() * 100}%;
        animation-duration: ${Math.random() * 3 + 2}s;
        animation-delay: ${Math.random() * 5}s;
      `;
      starsContainer.appendChild(star);
    }

    const API = 'http://localhost:8080/api/auth';

    function showMsg(text, type) {
      document.getElementById('msg').innerHTML =
        `<div class="msg ${type}">${text}</div>`;
    }

    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showMsg('⚠️ Please enter username and password!', 'error');
        return;
      }

      const btn = document.getElementById('loginBtn');
      btn.textContent = '🌌 Entering Universe...';
      btn.style.pointerEvents = 'none';

      try {
        const res = await fetch(`${API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('username', username);
          showMsg('✅ Welcome to the Universe! Redirecting...', 'success');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
        } else {
          showMsg('❌ ' + data.message, 'error');
          btn.textContent = '🏃 LAUNCH →';
          btn.style.pointerEvents = 'auto';
        }
      } catch(e) {
        showMsg('❌ Server connection failed!', 'error');
        btn.textContent = '🏃 LAUNCH →';
        btn.style.pointerEvents = 'auto';
      }
    }

    async function showRegister() {
      const username = prompt('Enter new username:');
      const password = prompt('Enter new password:');
      if (!username || !password) return;

      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      showMsg(data.message, res.ok ? 'success' : 'error');
    }
  </script>
</body>
</html>
